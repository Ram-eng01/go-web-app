apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-web-apps
  labels:
    app: go-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-web-app 
  template:
    metadata:
      app: go-web-app
    spec:
      containers:
        - name: go-web-application
          image: rammohan855/go-web-app:v1
          ports:
            - containerPort: 8080
